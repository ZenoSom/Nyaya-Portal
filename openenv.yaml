spec_version: 1
name: nyaya_portal
description: Nyaya Portal - Court Case Lookup System.
type: space
runtime: fastapi
app: server.app:app
port: 7860

entrypoint:
  module: server.app
  callable: app

server:
  host: 0.0.0.0
  port: 7860

endpoints:
  health: /health
  tasks: /tasks
  reset: /reset
  step: /step
  state: /state
  grader: /grader
  baseline: /baseline

tasks:
  - id: easy_case_lookup
    name: Find Oldest Pending Property Matter
    description: Find the oldest pending property matter.
    difficulty: easy
    grader: graders.easy_case_lookup:grade
  - id: medium_backlog_triage
    name: Prioritize Most Urgent Criminal Backlog
    description: Prioritize the most urgent criminal backlog.
    difficulty: medium
    grader: graders.medium_backlog_triage:grade
  - id: hard_cross_docket_review
    name: Select Strongest Cross-Docket Escalation Candidate
    description: Select the strongest cross-docket escalation candidate.
    difficulty: hard
    grader: graders.hard_cross_docket_review:grade
